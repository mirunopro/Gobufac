<title>異世界町工場無双</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#1a0f06;display:flex;justify-content:center;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Courier New',monospace;}
#gc{width:100%;max-width:430px;height:100svh;position:relative;overflow:hidden;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;}
#hud{position:absolute;top:0;left:0;right:0;padding:7px 8px 5px;background:linear-gradient(180deg,rgba(15,8,0,0.9) 70%,transparent);z-index:20;pointer-events:none;}
#htitle{text-align:center;font-size:15px;font-weight:900;color:#ff9944;text-shadow:0 0 8px #ff6600;letter-spacing:2px;margin-bottom:4px;}
.sr{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;}
.sc{background:rgba(20,10,0,0.85);border:1px solid rgba(255,140,40,0.25);border-radius:8px;padding:2px 8px;font-size:12px;color:#ffbb77;display:flex;align-items:center;gap:2px;}
.sc b{color:#ffdd00;}
#panel{position:absolute;bottom:0;left:0;right:0;background:rgba(10,5,0,0.96);border-top:1px solid rgba(255,140,40,0.2);padding:6px 6px 10px;z-index:20;}
.mb{background:rgba(20,10,0,0.9);border:1px solid rgba(255,140,40,0.2);border-radius:7px;padding:5px 10px;font-size:11px;color:#cc8844;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.mb.on{background:rgba(100,40,0,0.85);border-color:#ff9944;color:#ffdd00;}
.mbar{display:flex;gap:4px;justify-content:center;margin-bottom:5px;}
.irow{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;}
.it{background:rgba(18,8,0,0.9);border:2px solid rgba(200,100,30,0.2);border-radius:9px;padding:6px 4px 4px;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;min-width:50px;-webkit-tap-highlight-color:transparent;}
.it.on{border-color:#ff9944;background:rgba(80,30,0,0.6);}
.it.off{opacity:0.3;pointer-events:none;}
.ie{font-size:19px;}.in{font-size:8px;color:#ffbb77;font-weight:bold;}.ip{font-size:8px;color:#ffdd00;}
#dp{position:absolute;bottom:310px;left:50%;transform:translateX(-50%);background:rgba(6,3,0,0.97);border:1px solid #ff9944;border-radius:12px;padding:8px 10px 6px;z-index:30;display:none;flex-direction:column;align-items:center;gap:3px;}
#dp.on{display:flex;}
#dpLbl{font-size:11px;color:#ff9944;letter-spacing:2px;font-weight:bold;}
#dpCv{touch-action:none;width:280px;height:185px;display:block;}
#dpHint{font-size:9px;color:#886644;}
.ft{position:absolute;font-size:13px;font-weight:bold;color:#ffdd00;pointer-events:none;z-index:200;text-shadow:0 0 6px #ff6600;animation:fup 1.1s ease forwards;}
@keyframes fup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-44px)}}
#joy{position:absolute;bottom:170px;left:14px;z-index:25;display:none;}
#jb{width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.15);}
#jk{position:absolute;top:50%;left:50%;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.28);border:2px solid rgba(255,255,255,0.4);transform:translate(-50%,-50%);pointer-events:none;}
#rb{position:absolute;bottom:170px;right:14px;width:64px;height:64px;border-radius:50%;background:rgba(255,100,0,0.85);border:3px solid rgba(255,255,255,0.3);font-size:26px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:25;-webkit-tap-highlight-color:transparent;}
#rb.show{display:flex;}
#mhint{position:absolute;top:82px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);border:1px solid #ff9944;border-radius:10px;padding:3px 10px;font-size:10px;color:#ffdd00;z-index:21;pointer-events:none;white-space:nowrap;display:none;}
#mb2{position:absolute;top:7px;right:7px;z-index:22;background:rgba(0,0,0,0.7);border:1px solid rgba(255,140,40,0.4);border-radius:7px;padding:3px 8px;color:#ffbb77;font-size:11px;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
#tp{display:none;position:absolute;top:72px;left:50%;transform:translateX(-50%);background:rgba(6,3,0,0.97);border:2px solid #ffdd00;border-radius:12px;padding:12px 14px;z-index:50;text-align:center;min-width:230px;}
#tp h3{font-size:13px;font-weight:900;color:#ffdd00;margin-bottom:6px;}
#tm{font-size:11px;color:#ffcc88;margin-bottom:10px;line-height:1.7;white-space:pre-line;}
#tok{background:#ff9944;border:none;border-radius:7px;padding:6px 18px;font-size:12px;font-weight:bold;color:#1a0800;cursor:pointer;font-family:inherit;}
#opening{position:absolute;top:0;left:0;right:0;bottom:0;z-index:200;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;}
#oc{position:absolute;top:0;left:0;width:100%;height:100%;}
#oo{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(0,0,0,0) 35%,rgba(0,0,0,0.75) 70%,rgba(0,0,0,0.97) 100%);}
#ot{position:relative;z-index:2;text-align:center;padding-bottom:50px;}
#ot h1{font-size:24px;font-weight:900;color:#ff9944;text-shadow:0 0 16px #ff6600,2px 2px 0 #000;letter-spacing:3px;margin-bottom:4px;}
#ot p{font-size:11px;color:#ffcc88;text-shadow:1px 1px 0 #000;margin-bottom:16px;}
#otap{font-size:13px;font-weight:bold;color:#ffdd00;text-shadow:0 0 8px #ff8800;animation:blink 1s infinite alternate;letter-spacing:2px;}
@keyframes blink{from{opacity:0.3}to{opacity:1}}
#tut{position:absolute;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(0,0,0,0.82);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#tutBox{background:rgba(10,5,0,0.97);border:2px solid #ff9944;border-radius:16px;padding:18px 20px;max-width:340px;width:100%;}
#tutNum{font-size:10px;color:#ff9944;letter-spacing:2px;margin-bottom:8px;text-align:center;}
#tutTitle{font-size:17px;font-weight:900;color:#ffdd00;text-align:center;margin-bottom:10px;text-shadow:0 0 8px #ff6600;}
#tutBody{font-size:13px;color:#ffcc88;line-height:1.8;margin-bottom:14px;white-space:pre-line;text-align:center;}
#tutNext{background:#ff9944;border:none;border-radius:10px;padding:10px 28px;font-size:14px;font-weight:bold;color:#1a0800;cursor:pointer;font-family:inherit;display:block;margin:0 auto;-webkit-tap-highlight-color:transparent;}
#tutNext:active{transform:scale(0.92);}
#tut.hide{display:none;}

    <div class="it" id="iF" onclick="sel('fishIn')"><span class="ie">🐟</span><span class="in">魚供給</span><span class="ip">💰80</span></div>
    <div class="it" id="iK" onclick="sel('canner')"><span class="ie">⚙️</span><span class="in">缶詰機</span><span class="ip">💰120</span></div>
    <div class="it" id="iL" onclick="sel('labeler')"><span class="ie">🏷️</span><span class="in">ラベル機</span><span class="ip">💰80</span></div>
    <div class="it" id="iX" onclick="sel('boxer')"><span class="ie">📦</span><span class="in">箱詰め</span><span class="ip">💰100</span></div>
    <div class="it" id="iS" onclick="sel('ship')"><span class="ie">🚚</span><span class="in">出荷口</span><span class="ip">💰60</span></div>
    <div class="it" id="iE" onclick="sel('fusebox')"><span class="ie">⚡</span><span class="in">配電盤</span><span class="ip">💰60</span></div>
    <div class="it" id="iSh" onclick="sel('shrimpIn')" style="display:none"><span class="ie">🦐</span><span class="in">エビ供給</span><span class="ip">💰150</span></div>
    <div class="it" id="iCr" onclick="sel('crabIn')" style="display:none"><span class="ie">🦀</span><span class="in">カニ供給</span><span class="ip">💰250</span></div>
  </div>
</div>
</div>

<script>
var TW=96,TH=54,ROWS=18,COLS=18;
var CW=390,CH=700;
var camX=0,camY=0;
var animT=0,beltAnim=0;
var mode='build',curItem='conveyor';
var bombCount=0;
var explosions=[]; // active explosion animations
var items=[],nextId=0;
var undoStack=[],redoStack=[]; // each entry: {c,r,type,dir,gold}
var pendingPlace=null,hoverTile=null;
var gameStarted=false;

// ── polyfill ──
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}

var cv=document.getElementById('cv');
var ctx=cv.getContext('2d');
function resize(){CW=cv.offsetWidth;CH=cv.offsetHeight;cv.width=CW;cv.height=CH;}
resize();
window.addEventListener('resize',resize);

// ── ISO ──
function isoXY(c,r){return{x:CW/2+(c-r)*TW/2+camX,y:120+(c+r)*TH/2+camY};}
function inBounds(c,r){return c>=0&&c<COLS&&r>=0&&r<ROWS;}
function tileAt(sx,sy){
  var best=null,bd=99999;
  for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){
    var p=isoXY(c,r);
    var d=Math.abs(sx-p.x)*0.7+Math.abs(sy-p.y)*1.4;
    if(d<bd){bd=d;best={c:c,r:r};}
  }}
  return bd<TW?best:null;
}

var DIR={NW:{dc:-1,dr:-1},N:{dc:0,dr:-1},NE:{dc:1,dr:-1},W:{dc:-1,dr:0},E:{dc:1,dr:0},SW:{dc:-1,dr:1},S:{dc:0,dr:1},SE:{dc:1,dr:1}};

// ── Grid ──
var grid=[];
for(var _r=0;_r<ROWS;_r++){grid.push([]);for(var _c=0;_c<COLS;_c++)grid[_r].push(null);}

// ── Game state ──
var G={gold:300,fish:0,cans:0,boxes:0,tier:0};
var TIER_NAMES=['🐟 魚Tier','🦐 エビTier','🦀 カニTier'];
var TIER_GOLD=[0,5000,20000];
var COST={conveyor:10,fishIn:80,shrimpIn:150,crabIn:250,canner:120,labeler:80,boxer:100,ship:60,fusebox:60};
var NEED_DIR={conveyor:1,fishIn:1,shrimpIn:1,crabIn:1,canner:1,labeler:1,boxer:1,ship:0,fusebox:0};
var MAX_HP={canner:100,labeler:100,boxer:100};
var SELL={can_raw:10,can_labeled:30,box:50,can_shrimp:25,can_shrimp_lbl:55,can_crab:60,can_crab_lbl:120};
var BELT_SPD=0.55,MACH_T=1.8;

// ── Blackout ──
var lineRunning=0; // 0=stopped until fusebox placed
var tutStep=0;     // tutorial progress
var BK={active:0,timer:60+Math.random()*60,duration:0,flashT:0,smoke:[],warn:0,warned:0};
function resetBK(){BK.timer=50+Math.random()*50;BK.warned=0;BK.warn=0;}

// ── Worker ──
var W={tc:6,tr:7,speed:5,aT:0,dx:0,dy:0};
var keys={};
window.addEventListener('keydown',function(e){keys[e.key]=1;});
window.addEventListener('keyup',function(e){keys[e.key]=0;});

// ── Touch/pan ──
var panStart=null,mDown=0,mMoved=0,mStart=null;
cv.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(e.touches.length===1)panStart={x:e.touches[0].clientX,y:e.touches[0].clientY,cx:camX,cy:camY,moved:0};
},{passive:false});
cv.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===1&&panStart&&mode!=='work'){
    var dx=e.touches[0].clientX-panStart.x,dy=e.touches[0].clientY-panStart.y;
    if(Math.abs(dx)+Math.abs(dy)>6)panStart.moved=1;
    if(panStart.moved){camX=panStart.cx+dx;camY=panStart.cy+dy;}
  }
},{passive:false});
cv.addEventListener('touchend',function(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(!panStart||!panStart.moved){
      var r2=cv.getBoundingClientRect();
      tap((t.clientX-r2.left)*(CW/r2.width),(t.clientY-r2.top)*(CH/r2.height));
    }
  }
  panStart=null;
},{passive:false});
cv.addEventListener('mousedown',function(e){mDown=1;mMoved=0;mStart={x:e.clientX,y:e.clientY,cx:camX,cy:camY};});
cv.addEventListener('mousemove',function(e){
  var r2=cv.getBoundingClientRect();
  hoverTile=tileAt((e.clientX-r2.left)*(CW/r2.width),(e.clientY-r2.top)*(CH/r2.height));
  if(mDown&&mStart&&mode!=='work'){
    var dx=e.clientX-mStart.x,dy=e.clientY-mStart.y;
    if(Math.abs(dx)+Math.abs(dy)>5){mMoved=1;camX=mStart.cx+dx;camY=mStart.cy+dy;}
  }
});
cv.addEventListener('mouseup',function(e){
  if(mDown&&!mMoved){var r2=cv.getBoundingClientRect();tap((e.clientX-r2.left)*(CW/r2.width),(e.clientY-r2.top)*(CH/r2.height));}
  mDown=0;
});

function tap(sx,sy){
  var t=tileAt(sx,sy);if(!t)return;
  var c=t.c,r=t.r;
  if(mode==='delete'){
    if(grid[r][c]){
      var ref=Math.floor((COST[grid[r][c].type]||0)*0.5);
      // Save undo snapshot for delete
      undoStack.push({c:c,r:r,prev:JSON.parse(JSON.stringify(grid[r][c])),type:null,dir:null,goldBefore:G.gold});
      redoStack=[];
      G.gold+=ref;
      items=items.filter(function(i){return!(Math.round(i.c)===c&&Math.round(i.r)===r);});
      grid[r][c]=null;
      if(undoStack.length>30) undoStack.shift();
      checkFuseboxRemoved();
      float2('+💰'+ref,sx,sy);
    }
    return;
  }
  if(mode==='bomb'){
    if(bombCount<=0){
      if(G.gold>=500){
        G.gold-=500;
        bombCount++;
        float2('💣 爆弾GET！マスをタップして爆破！',CW/2-100,170);
        var mh2=document.getElementById('mhint');
        if(mh2)mh2.textContent='💣 爆破したいマスをタップ！（残り'+bombCount+'個）';
      } else {
        float2('💰500必要！（今'+G.gold+'）',sx,sy);
      }
      return;
    }
    bombCount--;
    doBomb(c,r,sx,sy);
    var mh2=document.getElementById('mhint');
    if(mh2)mh2.textContent=bombCount>0?'💣 爆破したいマスをタップ！（残り'+bombCount+'個）':'💣 爆弾は💰500で購入';
    return;
  }
  if(mode==='work')return;
  if(grid[r][c]){float2('占有済み',sx,sy);return;}
  if(G.gold<(COST[curItem]||0)){float2('💰不足！',sx,sy);return;}
  if(NEED_DIR[curItem]){
    pendingPlace={c:c,r:r,sx:sx,sy:sy};
    document.getElementById('dp').classList.add('on');
    openDP();
  }else{
    place(c,r,'E');float2('✅',sx,sy);
  }
}

function pd(dir){
  document.getElementById('dp').classList.remove('on');
  if(!pendingPlace)return;
  var c=pendingPlace.c,r=pendingPlace.r,sx=pendingPlace.sx,sy=pendingPlace.sy;
  pendingPlace=null;
  if(grid[r][c]||G.gold<(COST[curItem]||0)){float2('エラー',sx,sy);return;}
  place(c,r,dir);float2('✅',sx,sy);
}

function place(c,r,dir){
  // Save undo snapshot
  undoStack.push({c:c,r:r,prev:null,type:curItem,dir:dir,goldBefore:G.gold});
  redoStack=[];
  G.gold-=COST[curItem];
  var hp=MAX_HP[curItem]||null;
  grid[r][c]={type:curItem,dir:dir,proc:0,timer:0,inp:null,hp:hp,maxHp:hp,broken:0,paused:0};
  if(undoStack.length>30) undoStack.shift(); // limit history
  if(curItem==='fusebox'&&!lineRunning){
    lineRunning=1;
    advTut(3); // jump to "line started" step
    float2('⚡ 電源ON！ラインスタート！',CW/2-80,160);
    setTimeout(function(){showTutStep();},600);
  }
}

function setMode(m){
  mode=m;
  document.getElementById('dp').classList.remove('on');
  document.getElementById('mBuild').classList.toggle('on',m==='build');
  document.getElementById('mWork').classList.toggle('on',m==='work');
  document.getElementById('mDel').classList.toggle('on',m==='delete');
  document.getElementById('mBomb').classList.toggle('on',m==='bomb');
  var jy=document.getElementById('joy'),rb=document.getElementById('rb'),mh=document.getElementById('mhint');
  if(m==='work'){jy.style.display='block';rb.classList.add('show');mh.style.display='block';mh.textContent='🚶スティックで移動 / 🔧配電盤に近づいて修理';}
  else{jy.style.display='none';rb.classList.remove('show');mh.style.display='none';}
  if(m==='bomb'){
    var mh=document.getElementById('mhint');
    mh.style.display='block';
    mh.textContent=bombCount>0?'💣 爆破したいマスをタップ！（残り'+bombCount+'個）':'💣 爆弾は💰500で購入';
  }
}

function sel(id){
  curItem=id;
  var all=['iC','iF','iK','iL','iX','iS','iE','iSh','iCr'];
  for(var i=0;i<all.length;i++)document.getElementById(all[i]).classList.remove('on');
  var m2={conveyor:'iC',fishIn:'iF',canner:'iK',labeler:'iL',boxer:'iX',ship:'iS',fusebox:'iE',shrimpIn:'iSh',crabIn:'iCr'};
  var el=document.getElementById(m2[id]);if(el)el.classList.add('on');
  setMode('build');
}

// ── Repair ──
function doRepair(){
  var best=null,bd=2.5;
  for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){
    var cell=grid[r][c];
    if(!cell)continue;
    var target=BK.active?(cell.type==='fusebox'):cell.broken;
    if(!target)continue;
    var d=Math.sqrt((W.tc-c)*(W.tc-c)+(W.tr-r)*(W.tr-r));
    if(d<bd){bd=d;best={c:c,r:r};}
  }}
  if(best){
    var cell=grid[best.r][best.c];
    var p=isoXY(best.c,best.r);
    if(BK.active&&cell.type==='fusebox'){
      endBlackout();
      float2('⚡復電！',p.x,p.y-50);
    }else{
      cell.hp=cell.maxHp;cell.broken=0;
      float2('🔧修理完了！',p.x,p.y-50);
    }
  }else{
    float2(BK.active?'⚡配電盤に近づいて！':'近くに故障なし',CW/2-60,CH/2);
  }
}

// ── Blackout ──
function endBlackout(){
  BK.active=0;BK.smoke=[];
  for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){
    var cell=grid[r][c];if(!cell)continue;
    cell.paused=0;
    if(cell.type==='fusebox')cell.broken=0;
  }}
  resetBK();
  float2('✅工場再開！',CW/2-50,150);
}

// ── Simulate ──
function simulate(dt){
  animT+=dt;
  if(lineRunning) beltAnim=(beltAnim+dt/BELT_SPD)%1;
  updateExplosions(dt);

  // Worker movement
  if(mode==='work'){
    var dx=W.dx,dy=W.dy;
    if(keys['ArrowLeft']||keys['a'])dx-=1;
    if(keys['ArrowRight']||keys['d'])dx+=1;
    if(keys['ArrowUp']||keys['w'])dy-=1;
    if(keys['ArrowDown']||keys['s'])dy+=1;
    var len=Math.sqrt(dx*dx+dy*dy);
    if(len>1){dx/=len;dy/=len;}
    W.tc=Math.max(0.5,Math.min(COLS-0.5,W.tc+(dx+dy)*W.speed*dt*0.7));
    W.tr=Math.max(0.5,Math.min(ROWS-0.5,W.tr+(-dx+dy)*W.speed*dt*0.7));
    W.aT=(W.aT+dt*(len>0.1?4:1))%(Math.PI*2);
  }

  // Blackout logic
  if(!BK.active){
    BK.timer-=dt;
    if(BK.timer<=8&&!BK.warned){BK.warned=1;BK.warn=8;float2('⚠️電圧不安定！',CW/2-60,150);}
    if(BK.warned)BK.warn-=dt;
    BK.flashT+=BK.warned?dt*8:0;
    if(BK.timer<=0){
      if(!hasFusebox()){resetBK();return;} // no fusebox = no blackout
      BK.active=1;BK.duration=25+Math.random()*20;BK.flashT=0;
      for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){
        var cell=grid[r][c];if(!cell)continue;
        if(cell.type!=='conveyor'&&cell.type!=='fishIn'&&cell.type!=='shrimpIn'&&cell.type!=='crabIn'&&cell.type!=='fusebox')cell.paused=1;
        if(cell.type==='fusebox')cell.broken=1;
      }}
      float2('⚡停電！配電盤を修理して！',CW/2-90,150);
      if(typeof playBK==='function')playBK();
    }
  }else{
    BK.flashT+=dt*3;BK.duration-=dt;
    for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){
      var cell=grid[r][c];
      if(cell&&cell.type==='fusebox'&&cell.broken&&Math.random()<dt*3){
        var sp=isoXY(c,r);
        BK.smoke.push({x:sp.x+(Math.random()-0.5)*20,y:sp.y-28,vx:(Math.random()-0.5)*0.8,vy:-Math.random()*1.5-0.4,life:1,size:7+Math.random()*11,fire:Math.random()<0.3});
      }
    }}
    BK.smoke=BK.smoke.filter(function(s){return s.life>0;});
    for(var i=0;i<BK.smoke.length;i++){var s=BK.smoke[i];s.x+=s.vx;s.y+=s.vy;s.size+=0.25;s.life-=dt*0.45;}
    if(BK.duration<=0)endBlackout();
  }

  // Stop everything until fusebox is placed
  if(!lineRunning) return;

  // Fish/shrimp/crab inputs
  for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){
    var cell=grid[r][c];if(!cell)continue;
    if(cell.type!=='fishIn'&&cell.type!=='shrimpIn'&&cell.type!=='crabIn')continue;
    cell.timer-=dt;
    if(cell.timer<=0){
      cell.timer=cell.type==='crabIn'?3:cell.type==='shrimpIn'?2:1.5;
      var d=DIR[cell.dir||'E'];
      var nc=c+d.dc,nr=r+d.dr;
      if(inBounds(nc,nr)&&grid[nr][nc]){
        var clash=0;
        for(var k=0;k<items.length;k++){if(Math.round(items[k].c)===nc&&Math.round(items[k].r)===nr&&items[k].prog<0.15){clash=1;break;}}
        if(!clash){
          var raw=cell.type==='crabIn'?'crab':cell.type==='shrimpIn'?'shrimp':'fish';
          items.push({id:nextId++,c:nc,r:nr,prog:0,content:raw});G.fish++;
        }
      }
    }
  }}

  // Belt + machine feed
  var dead=[];
  for(var i=0;i<items.length;i++){
    var item=items[i];
    // Use source tile tracking for diagonal belts
    var ic=item.srcC!==undefined?item.srcC:Math.round(item.c);
    var ir=item.srcR!==undefined?item.srcR:Math.round(item.r);
    if(!inBounds(ic,ir)){dead.push(item.id);continue;}
    var cell=grid[ir][ic];if(!cell){dead.push(item.id);continue;}
    if(cell.type==='conveyor'){
      item.prog+=dt/BELT_SPD;
      if(item.prog>=1){
        var d=DIR[cell.dir||'E'];
        var nc=ic+d.dc,nr=ir+d.dr;
        if(!inBounds(nc,nr)||!grid[nr][nc]){dead.push(item.id);continue;}
        item.c=nc;item.r=nr;item.prog=0;
        item.srcC=undefined; item.srcR=undefined;
        // ic/ir now point to destination - recalculate for machine feed
        var dst=grid[nr][nc];
        if(dst&&dst.type!=='conveyor'&&!dst.proc&&!dst.broken&&!dst.paused)feedM(item,dst,nc,nr,dead);
        continue;
      }else{
        var d=DIR[cell.dir||'E'];
        // Visual interpolation only - item logically stays on source tile (ic,ir)
        item.c=ic+d.dc*item.prog;
        item.r=ir+d.dr*item.prog;
        // item.srcC/srcR track the source tile for correct cell lookup
        item.srcC=ic; item.srcR=ir;
      }
    }
    // Use srcC/srcR if available to get correct source cell
    var lookC=item.srcC!==undefined?item.srcC:ic;
    var lookR=item.srcR!==undefined?item.srcR:ir;
    var srcCell=grid[lookR][lookC];
    if(!srcCell) srcCell=cell;
    if(srcCell.type==='canner'||srcCell.type==='labeler'||srcCell.type==='boxer'||srcCell.type==='ship'){
      if(!srcCell.proc&&!srcCell.broken&&!srcCell.paused)feedM(item,srcCell,lookC,lookR,dead);
    }
  }
  items=items.filter(function(i){return dead.indexOf(i.id)===-1;});

  // Machine timers
  for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){
    var cell=grid[r][c];if(!cell||!cell.proc||cell.paused)continue;
    cell.timer-=dt;
    if(cell.timer<=0){
      cell.proc=0;
      if(cell.hp!=null){cell.hp-=0.8;if(cell.hp<=0){cell.hp=0;cell.broken=1;cell.inp=null;continue;}}
      var out=outContent(cell.type,cell.inp);
      if(out){
        var d=DIR[cell.dir||'E'];var nc=c+d.dc,nr=r+d.dr;
        if(inBounds(nc,nr)&&grid[nr][nc])items.push({id:nextId++,c:nc,r:nr,prog:0,content:out});
        if(cell.type==='boxer')G.boxes++;
      }
      if(cell.type==='ship'){
        var val=SELL[cell.inp]||10;G.gold+=val;
        var lbs=['can_labeled','can_raw','can_shrimp','can_shrimp_lbl','can_crab','can_crab_lbl'];
        if(lbs.indexOf(cell.inp)!==-1)G.cans++;
        var p=isoXY(c,r);float2('+💰'+val,p.x,p.y-55);
      }
      cell.inp=null;
    }
  }}
}

function feedM(item,cell,c,r,dead){
  var ok={canner:['fish','shrimp','crab'],labeler:['can_raw','can_shrimp','can_crab'],
    boxer:['can_labeled','can_shrimp_lbl','can_crab_lbl'],
    ship:['can_labeled','can_raw','box','can_shrimp','can_shrimp_lbl','can_crab','can_crab_lbl']};
  var list=ok[cell.type];
  if(list&&list.indexOf(item.content)!==-1){
    dead.push(item.id);cell.proc=1;
    cell.timer=cell.type==='ship'?0.08:MACH_T;cell.inp=item.content;
  }
}
function outContent(type,inp){
  if(type==='canner'){if(inp==='fish')return 'can_raw';if(inp==='shrimp')return 'can_shrimp';if(inp==='crab')return 'can_crab';}
  if(type==='labeler'){if(inp==='can_raw')return 'can_labeled';if(inp==='can_shrimp')return 'can_shrimp_lbl';if(inp==='can_crab')return 'can_crab_lbl';}
  if(type==='boxer'&&(inp==='can_labeled'||inp==='can_shrimp_lbl'||inp==='can_crab_lbl'))return 'box';
  return null;
}

// ── Draw ──
var MCFG={
  fishIn:{top:'#0d3a52',lft:'#041e2c',rgt:'#082840',glow:'#22aaff',em:'🐟',lbl:'魚供給'},
  shrimpIn:{top:'#3a1a2a',lft:'#200a18',rgt:'#301220',glow:'#ff88aa',em:'🦐',lbl:'エビ供給'},
  crabIn:{top:'#3a1208',lft:'#200802',rgt:'#300e04',glow:'#ff6633',em:'🦀',lbl:'カニ供給'},

  ctx.restore();
}


// ── MONEY PILE ──
function drawCoin(ctx, x, y, r, oy){
  var t=3; // thin coin thickness
  // Shadow
  ctx.save(); ctx.globalAlpha=0.18;
  ctx.beginPath(); ctx.ellipse(x,y+t+2,r,r*0.38,0,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill(); ctx.restore();
  // Side band
  ctx.beginPath();
  ctx.ellipse(x,y+t,r,r*0.38,0,0,Math.PI*2);
  ctx.fillStyle='#a87800'; ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x,y,r,r*0.38,0,0,Math.PI*2);
  ctx.fillStyle='#c89000'; ctx.fill();
  // Side rect connecting top and bottom ellipses
  ctx.save();
  ctx.beginPath();
  ctx.rect(x-r, y-r*0.38, r*2, t+r*0.38);
  ctx.clip();
  var sg=ctx.createLinearGradient(x-r,0,x+r,0);
  sg.addColorStop(0,'#8B6914'); sg.addColorStop(0.25,'#c89000');
  sg.addColorStop(0.5,'#ffd700'); sg.addColorStop(0.75,'#c89000');
  sg.addColorStop(1,'#8B6914');
  ctx.fillStyle=sg;
  ctx.fillRect(x-r,y-r*0.38,r*2,t+r*0.38+2);
  ctx.restore();
  // Top face
  ctx.beginPath(); ctx.ellipse(x,y,r,r*0.38,0,0,Math.PI*2);
  var tg=ctx.createRadialGradient(x-r*0.3,y-r*0.1,0,x,y,r);
  tg.addColorStop(0,'#fff8c0'); tg.addColorStop(0.25,'#ffd700');
  tg.addColorStop(0.65,'#d4a800'); tg.addColorStop(1,'#9a7200');
  ctx.fillStyle=tg; ctx.fill();
  ctx.strokeStyle='rgba(180,130,0,0.5)'; ctx.lineWidth=0.8; ctx.stroke();
  // Rim ring
  ctx.beginPath(); ctx.ellipse(x,y,r*0.86,r*0.86*0.38,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(160,120,0,0.55)'; ctx.lineWidth=1; ctx.stroke();
  // ★ emboss
  ctx.save();
  ctx.font='bold '+(r*0.8)+'px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(100,65,0,0.7)';
  ctx.fillText('★',x,y-r*0.04);
  ctx.restore();
}

function drawMoneyPile(){
  if(G.gold<=0) return;
  var spots=[
    {c:0,r:0},{c:1,r:0},{c:0,r:1},
    {c:2,r:0},{c:0,r:2},{c:3,r:0},
    {c:0,r:3},{c:4,r:0},{c:0,r:4}
  ];
  var CPER=8;
  var total=Math.floor(G.gold/100);
  if(total<=0) return;
  var filled=Math.min(Math.floor(total/CPER), spots.length-1);
  var last=total - filled*CPER;
  if(last<=0&&filled>0){filled--;last=CPER;}
  if(last>CPER) last=CPER;

  var CR=TW*0.18; // coin radius
  var GAP=4;      // gap between stacked coins

  for(var si=0;si<=filled&&si<spots.length;si++){
    var sp=spots[si];
    var p=isoXY(sp.c,sp.r);
    var x=p.x, y=p.y-TH*0.1;
    var cnt=(si<filled)?CPER:last;
    if(cnt<=0) continue;
    // Draw from bottom to top
    for(var k=0;k<cnt;k++){
      drawCoin(ctx, x, y-k*GAP, CR, 0);
    }
    // Label above top coin
    if(si===filled){
      var ly=y-cnt*GAP-CR*0.38-14;
      ctx.save();
      ctx.font='bold 11px monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.strokeStyle='rgba(0,0,0,0.9)'; ctx.lineWidth=3;
      ctx.fillStyle='#ffee22';
      ctx.strokeText('💰'+G.gold,x,ly);
      ctx.fillText('💰'+G.gold,x,ly);
      ctx.restore();
    }
  }
}

function openDP(){

  var dc=fr.getContext('2d');

  function dpxy(col,row){return{x:pcw/2+(col-1-(row-1))*ptw/2,y:pch*0.45+(col-1+(row-1))*pth/2};}
  function drawDPT(col,row,hov){
    var p2=dpxy(col,row),px=p2.x,py=p2.y,tw2=ptw/2,th2=pth/2,sh2=14;
    var dir=DPD[row][col],isC=(dir===null);

    dc.fillStyle=isC?'#3a2010':hov?'#cc5500':'#2a1a08';dc.fill();
    dc.strokeStyle=hov?'#ffdd00':'rgba(200,120,40,0.4)';dc.lineWidth=hov?2.5:1;dc.stroke();
    dc.beginPath();dc.moveTo(px-tw2,py);dc.lineTo(px,py+th2);dc.lineTo(px,py+th2+sh2);dc.lineTo(px-tw2,py+sh2);dc.closePath();dc.fillStyle='#160c04';dc.fill();
    dc.beginPath();dc.moveTo(px+tw2,py);dc.lineTo(px,py+th2);dc.lineTo(px,py+th2+sh2);dc.lineTo(px+tw2,py+sh2);dc.closePath();dc.fillStyle='#1e1006';dc.fill();
    if(isC){dc.font='20px serif';dc.textAlign='center';dc.textBaseline='middle';dc.fillText('📦',px,py);}
    else{
      var dm2=dmap[dir],sdx2=(dm2.dc-dm2.dr)*tw2*0.5,sdy2=(dm2.dc+dm2.dr)*th2*0.5;
      var ang2=Math.atan2(sdy2,sdx2),ax2=px+sdx2,ay2=py+sdy2;
      dc.save();dc.strokeStyle=hov?'#ffff44':'rgba(255,230,100,1)';dc.lineWidth=3;dc.lineCap='round';

function doBomb(cc,rc,sx,sy){
  // 3x3 area centered on (cc,rc)
  var destroyed=0;
  for(var dr=-1;dr<=1;dr++){
    for(var dc=-1;dc<=1;dc++){
      var nr=rc+dr,nc=cc+dc;
      if(!inBounds(nc,nr)) continue;
      if(grid[nr][nc]){
        items=items.filter(function(i){return!(Math.round(i.c)===nc&&Math.round(i.r)===nr);});
        grid[nr][nc]=null;
        destroyed++;
      }
    }
  }
  checkFuseboxRemoved();
  // Trigger big explosion animation
  var ep=isoXY(cc,rc);
  explosions.push({
    x:ep.x, y:ep.y,
    t:0,       // age in seconds
    dur:1.8,   // total duration
    particles:[]
  });
  // Generate particles
  var expl=explosions[explosions.length-1];
  for(var pi=0;pi<60;pi++){
    var ang=Math.random()*Math.PI*2;
    var spd=80+Math.random()*160;
    expl.particles.push({
      x:ep.x, y:ep.y,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd - Math.random()*60,
      life:0.6+Math.random()*1.0,
      size:4+Math.random()*12,
      color:pi%4===0?'#ff4400':pi%4===1?'#ffaa00':pi%4===2?'#ffff00':'#ff2200',
      type:pi<20?'fire':pi<40?'smoke':'spark'
    });
  }
  // Screen shake
  startShake();
  // Sound
  if(typeof playBombSound==='function') playBombSound();
  if(destroyed>0) float2('💥 '+destroyed+'個爆破！',sx,sy-30);
  else float2('💥 爆発！',sx,sy-30);
}

var shakeT=0,shakeAmp=0;
function startShake(){shakeT=0.4;shakeAmp=14;}

function updateExplosions(dt){
  shakeT=Math.max(0,shakeT-dt);
  shakeAmp*=0.85;
  // Apply shake to camera
  if(shakeT>0){
    camX+=( Math.random()-0.5)*shakeAmp*dt*60;
    camY+=( Math.random()-0.5)*shakeAmp*dt*60;
  }
  for(var ei=explosions.length-1;ei>=0;ei--){
    var ex=explosions[ei];
    ex.t+=dt;
    if(ex.t>ex.dur){explosions.splice(ei,1);continue;}
    for(var pi=0;pi<ex.particles.length;pi++){
      var p=ex.particles[pi];
      p.x+=p.vx*dt;
      p.y+=p.vy*dt;
      p.vy+=120*dt; // gravity
      p.vx*=0.96;
      p.life-=dt*0.8;
      p.size*=0.985;
    }
  }
}

function drawExplosions(){
  for(var ei=0;ei<explosions.length;ei++){
    var ex=explosions[ei];
    var progress=ex.t/ex.dur;
    // Big flash at start
    if(progress<0.08){
      ctx.save();
      ctx.globalAlpha=(0.08-progress)/0.08*0.85;
      ctx.fillStyle='#ffffff';
      ctx.fillRect(0,0,CW,CH);
      ctx.restore();
    }
    // Draw shockwave ring
    if(progress<0.25){
      ctx.save();
      ctx.globalAlpha=(0.25-progress)/0.25*0.7;
      ctx.strokeStyle='#ffaa00';
      ctx.lineWidth=4*(1-progress*4);
      var rad=progress*4*TW*1.8;
      ctx.beginPath();
      ctx.ellipse(ex.x,ex.y+TH*0.5,rad,rad*0.5,0,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
    // Draw particles
    for(var pi=0;pi<ex.particles.length;pi++){
      var p=ex.particles[pi];
      if(p.life<=0) continue;
      ctx.save();
      ctx.globalAlpha=Math.min(1,p.life)*0.9;
      if(p.type==='spark'){
        ctx.fillStyle='#ffffaa';
        ctx.fillRect(p.x-1,p.y-1,2,2);
      } else if(p.type==='smoke'){
        ctx.globalAlpha=Math.min(1,p.life)*0.35;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size*1.5,0,Math.PI*2);
        ctx.fillStyle='#555555';
        ctx.fill();
      } else {
        // fire
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();
      }
      ctx.restore();
    }
  }
  ctx.globalAlpha=1;
}

function playBombSound(){
  if(!audioCtx) return;
  var t=audioCtx.currentTime+0.02;
  // Low boom
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(120,t);
  o.frequency.exponentialRampToValueAtTime(20,t+0.8);
  g.gain.setValueAtTime(0.8,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.9);
  o.connect(g);g.connect(master());o.start(t);o.stop(t+1.0);
  // Mid crack
  var o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
  o2.type='sawtooth';
  o2.frequency.setValueAtTime(200,t);
  o2.frequency.exponentialRampToValueAtTime(50,t+0.3);
  g2.gain.setValueAtTime(0.4,t);
  g2.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  o2.connect(g2);g2.connect(master());o2.start(t);o2.stop(t+0.4);
  // Noise burst
  var buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.5),audioCtx.sampleRate);
  var data=buf.getChannelData(0);
  for(var i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,0.4);
  var src=audioCtx.createBufferSource();src.buffer=buf;
  var f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=800;
  var g3=audioCtx.createGain();g3.gain.setValueAtTime(0.5,t);g3.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  src.connect(f);f.connect(g3);g3.connect(master());
  src.start(t);src.stop(t+0.6);
}

// ── UNDO / REDO ──
function doUndo(){
  if(undoStack.length===0){float2('これ以上戻せない',CW/2-60,180);return;}
  var snap=undoStack.pop();
  var cur=grid[snap.r][snap.c];
  redoStack.push({c:snap.c,r:snap.r,prev:cur?JSON.parse(JSON.stringify(cur)):null,type:snap.type,dir:snap.dir,goldBefore:G.gold});
  if(snap.prev){
    grid[snap.r][snap.c]=snap.prev;
    G.gold=snap.goldBefore;
  } else {
    items=items.filter(function(i){return!(Math.round(i.c)===snap.c&&Math.round(i.r)===snap.r);});
    grid[snap.r][snap.c]=null;
    G.gold=snap.goldBefore;
    checkFuseboxRemoved();
  }
  updateUndoButtons();
  float2('↩ 元に戻した',CW/2-50,180);
}
function doRedo(){
  if(redoStack.length===0){float2('やり直す操作なし',CW/2-60,180);return;}
  var snap=redoStack.pop();
  undoStack.push({c:snap.c,r:snap.r,prev:grid[snap.r][snap.c]?JSON.parse(JSON.stringify(grid[snap.r][snap.c])):null,type:snap.type,dir:snap.dir,goldBefore:G.gold});
  if(snap.prev===null&&snap.type){
    G.gold=snap.goldBefore-(COST[snap.type]||0);
    var hp=MAX_HP[snap.type]||null;
    grid[snap.r][snap.c]={type:snap.type,dir:snap.dir,proc:0,timer:0,inp:null,hp:hp,maxHp:hp,broken:0,paused:0};
    if(snap.type==='fusebox'&&!lineRunning) lineRunning=1;
  } else if(snap.prev){
    var ref=Math.floor((COST[snap.prev.type]||0)*0.5);
    G.gold=snap.goldBefore+ref;
    items=items.filter(function(i){return!(Math.round(i.c)===snap.c&&Math.round(i.r)===snap.r);});
    grid[snap.r][snap.c]=null;
    checkFuseboxRemoved();
  }
  updateUndoButtons();
  float2('↪ やり直した',CW/2-50,180);
}

var audioCtx=null,musicOn=0,mTimer=null,currentBGM='';
function initAudio(){
  if(audioCtx)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}
function master(){
  if(!window._mn){
    var c=audioCtx.createDynamicsCompressor();
    c.threshold.value=-14;c.ratio.value=4;c.attack.value=0.003;c.release.value=0.25;
    c.connect(audioCtx.destination);window._mn=c;
  }
  return window._mn;
}
function pNote(freq,st,dur,type,vol,det){
  if(!audioCtx)return;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
  f.type='lowpass';f.frequency.value=2200;
  o.type=type||'square';o.frequency.value=freq;o.detune.value=det||0;
  g.gain.setValueAtTime(0.001,st);
  g.gain.linearRampToValueAtTime(vol||0.15,st+0.01);
  g.gain.setValueAtTime(vol||0.15,st+dur*0.75);
  g.gain.linearRampToValueAtTime(0.001,st+dur);
  o.connect(f);f.connect(g);g.connect(master());
  o.start(st);o.stop(st+dur+0.02);
}
function pDrum(t,type){
  if(!audioCtx)return;
  var g=audioCtx.createGain();g.connect(master());
  if(type==='kick'){
    var o=audioCtx.createOscillator();o.type='sine';
    o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(35,t+0.18);
    g.gain.setValueAtTime(0.55,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.connect(g);o.start(t);o.stop(t+0.25);
  } else if(type==='snare'){
    var buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.1),audioCtx.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.6);
    var src=audioCtx.createBufferSource();src.buffer=buf;
    var f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=1800;f.Q.value=0.7;
    g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    src.connect(f);f.connect(g);src.start(t);src.stop(t+0.12);
  } else if(type==='hat'){
    var buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.04),audioCtx.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    var src=audioCtx.createBufferSource();src.buffer=buf;
    var f=audioCtx.createBiquadFilter();f.type='highpass';f.frequency.value=7000;
    g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    src.connect(f);f.connect(g);src.start(t);src.stop(t+0.05);
  }
}

    [311.1,b*0.5],[293.7,b*0.25],[261.6,b*0.25],
    [246.9,b*0.5],[220,b*0.5],
    [196,b*1.0],
    [293.7,b*0.5],[349.2,b*0.25],[392,b*0.25],
    [440,b*0.5],[392,b*0.25],[349.2,b*0.25],
    [329.6,b*0.5],[293.7,b*0.5],
    [261.6,b*1.0],
    [349.2,b*0.5],[311.1,b*0.25],[293.7,b*0.25],
    [261.6,b*0.5],[246.9,b*0.5],
    [220,b*2.0]
  ];
  var lt=t;
  for(var i=0;i<lead.length;i++){
    if(lead[i][0]>0) pNote(lead[i][0],lt,lead[i][1]*0.82,'sawtooth',0.16,5);
    lt+=lead[i][1];
  }

  // ── COUNTER MELODY (square wave - high synth) ──
  var mel2=[
    [0,b*4],[587.3,b*0.5],[523.3,b*0.5],[493.9,b*0.5],[440,b*0.5],
    [0,b*4],[523.3,b*0.5],[493.9,b*0.5],[440,b*0.5],[392,b*0.5]
  ];
  var m2t=t;
  for(var i=0;i<mel2.length;i++){
    if(mel2[i][0]>0) pNote(mel2[i][0],m2t,mel2[i][1]*0.7,'square',0.09);
    m2t+=mel2[i][1];
  }

  // ── BASS (heavy, driving 8th notes) ──
  var bassNotes=[
    110,110,98,98,110,110,87.3,87.3,
    110,110,104,104,98,98,87.3,110
  ];
  for(var i=0;i<16;i++){
    var bbt=t+i*(b*0.5);
    pNote(bassNotes[i],bbt,b*0.4,'sawtooth',0.22,-5);
  }

  // ── DRUMS (aggressive battle pattern) ──
  for(var i=0;i<16;i++){
    var dbt=t+i*(b*0.5);
    // Kick: 1, 1.5, 3, 3.5 (double kicks)
    if(i===0||i===1||i===4||i===5||i===8||i===9||i===12) pDrum(dbt,'kick');
    // Snare: 2, 4
    if(i===4||i===12) pDrum(dbt,'snare');
    // Extra snare accent
    if(i===6||i===14) pDrum(dbt+b*0.25,'snare');
    // 16th hi-hats all
    pDrum(dbt,'hat');
  }
  // Open hat accent on beat 2.5, 4.5
  pDrum(t+b*2.5,'hat');pDrum(t+b*4.5,'hat');

  // ── PAD (low drone for tension) ──
  pNote(73.4,t,b*8*0.5,'triangle',0.06);
  pNote(110,t+b*8,b*8*0.5,'triangle',0.06);
}

function playFanfare(){
  if(!audioCtx)return;
  var t=audioCtx.currentTime+0.05,b=0.1;
  var ns=[[523,0],[659,b],[784,b*2],[1047,b*3.5],[784,b*5],[1047,b*6.5]];
  for(var i=0;i<ns.length;i++)pNote(ns[i][0],t+ns[i][1],b*1.8,'square',0.15);
}
function playBK(){
  if(!audioCtx)return;
  var t=audioCtx.currentTime+0.05;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(30,t+1.5);
  g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+1.5);
  o.connect(g);g.connect(master());o.start(t);o.stop(t+1.6);
}

function startBGM(type){
  initAudio();
  if(!audioCtx)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  if(mTimer){clearInterval(mTimer);mTimer=null;}
  currentBGM=type;
  musicOn=1;
  if(type==='opening'){
    playOpeningLoop();
    var loopLen=60/150*32*1000;
    mTimer=setInterval(function(){if(musicOn&&currentBGM==='opening')playOpeningLoop();},loopLen);
  } else {
    playGameLoop();
    var loopLen=60/160*16*1000;
    mTimer=setInterval(function(){if(musicOn&&currentBGM==='game')playGameLoop();},loopLen);
  }
  document.getElementById('mb2').textContent='🎵 ON';
}
function stopMusic(){
  musicOn=0;currentBGM='';
  if(mTimer){clearInterval(mTimer);mTimer=null;}
  document.getElementById('mb2').textContent='🎵 OFF';
}
function toggleMusic(){
  if(musicOn)stopMusic();
  else startBGM(gameStarted?'game':'opening');
}
function startMusic(){startBGM('game');}

// ── Main loop ──
var last=0;
function frame(ts){
  var dt=Math.min((ts-last)/1000,0.08);last=ts;
  simulate(dt);
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
  ctx.shadowBlur=0;
  ctx.shadowColor='transparent';
  ctx.clearRect(0,0,CW,CH);ctx.fillStyle='#1a0f06';ctx.fillRect(0,0,CW,CH);
  var s2;
  for(s2=0;s2<ROWS+COLS-1;s2++){for(var r=Math.max(0,s2-COLS+1);r<=Math.min(s2,ROWS-1);r++){var c=s2-r;if(c<0||c>=COLS)continue;var cell=grid[r][c];var ht=(hoverTile&&hoverTile.c===c&&hoverTile.r===r)&&mode==='build';if(!cell)drawGrass(c,r,ht);else if(cell.type==='conveyor')drawConveyor(c,r,cell.dir);}}
  for(var i=0;i<items.length;i++){var rr=Math.round(items[i].r),cc2=Math.round(items[i].c);var gr2=grid[rr]&&grid[rr][cc2];if(gr2&&gr2.type==='conveyor')drawItem(items[i]);}
  for(s2=0;s2<ROWS+COLS-1;s2++){for(var r=Math.max(0,s2-COLS+1);r<=Math.min(s2,ROWS-1);r++){var c=s2-r;if(c<0||c>=COLS)continue;var cell=grid[r][c];if(cell&&cell.type!=='conveyor')drawMachine(c,r);}}
  for(var i=0;i<items.length;i++){var rr=Math.round(items[i].r),cc2=Math.round(items[i].c);var gr2=grid[rr]&&grid[rr][cc2];if(gr2&&gr2.type!=='conveyor')drawItem(items[i]);}
  if(hoverTile&&mode==='build'){var p2=isoXY(hoverTile.c,hoverTile.r);if(!grid[hoverTile.r][hoverTile.c]){var gIco={conveyor:'➡️',fishIn:'🐟',shrimpIn:'🦐',crabIn:'🦀',canner:'⚙️',labeler:'🏷️',boxer:'📦',ship:'🚚',fusebox:'⚡'};ctx.save();ctx.globalAlpha=0.4;ctx.font='30px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(gIco[curItem]||'❓',p2.x,p2.y-TH*0.5-6);ctx.restore();}}
  drawMoneyPile();
  drawWorker();
  drawExplosions();
  for(var i=0;i<BK.smoke.length;i++){var sp=BK.smoke[i];ctx.save();ctx.globalAlpha=sp.life*0.65;ctx.beginPath();ctx.arc(sp.x,sp.y,sp.size,0,Math.PI*2);ctx.fillStyle=sp.fire?'rgba(255,80,0,0.8)':'rgba(110,110,110,0.6)';ctx.fill();ctx.restore();}
  if(BK.active){
    // Always reset before overlay
    ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.shadowColor='transparent';
    // Dark overlay - fixed alpha, no variable
    ctx.fillStyle='rgba(0,0,0,0.75)';
    ctx.fillRect(0,0,CW,CH);
    // Red emergency light
    ctx.fillStyle='rgba(160,0,0,0.18)';
    ctx.fillRect(0,0,CW,CH*0.4);
    // Flicker: just skip some frames
    if(Math.sin(animT*47)>0.85){
      ctx.fillStyle='rgba(0,0,0,0.08)';
      ctx.fillRect(0,0,CW,CH);
    }
    ctx.font='bold 15px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,50,50,'+(0.65+0.25*Math.abs(Math.sin(animT*3)))+')';
    ctx.strokeStyle='rgba(0,0,0,0.9)';ctx.lineWidth=3;
    ctx.strokeText('⚡ 停電中 ⚡',CW/2,95);ctx.fillText('⚡ 停電中 ⚡',CW/2,95);
    ctx.font='bold 11px monospace';ctx.fillStyle='rgba(255,200,50,0.9)';
    ctx.strokeText('🚶 ゴブ吉を配電盤へ！',CW/2,115);ctx.fillText('🚶 ゴブ吉を配電盤へ！',CW/2,115);
    ctx.globalAlpha=1;
  } else if(BK.warned&&BK.warn>0){
    ctx.globalAlpha=1;
    var wf=Math.abs(Math.sin(BK.flashT*2));
    if(wf>0.75){ctx.fillStyle='rgba(255,255,0,0.04)';ctx.fillRect(0,0,CW,CH);}
  }
  updateHUD();
  requestAnimationFrame(frame);
}
requestAnimationFrame(function(t){last=t;requestAnimationFrame(frame);});
